<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 16px; background: #fff;
      display: flex; flex-direction: column; gap: 12px;
    }
    h3 { font-size: 13px; font-weight: 600; color: #333; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 11px; color: #888; }
    input[type="text"] {
      width: 100%; height: 30px; border: 1px solid #ddd; border-radius: 6px;
      padding: 0 8px; font-size: 11px; outline: none;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #333;
    }
    input[type="text"]:focus { border-color: #7C66FF; }
    textarea {
      width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 6px;
      padding: 6px 8px; font-size: 11px; font-family: monospace; resize: none;
      outline: none; color: #333;
    }
    textarea:focus { border-color: #7C66FF; }
    button {
      width: 100%; height: 34px;
      background: #7C66FF; color: white; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer;
    }
    button:hover { background: #5C4CD9; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button.secondary { background: #f0f0f0; color: #333; }
    button.secondary:hover { background: #e0e0e0; }
    .hint { font-size: 11px; color: #aaa; line-height: 1.5; }
    .hint code { background: #f5f5f5; padding: 1px 4px; border-radius: 3px; font-size: 10px; }
    .status {
      padding: 7px 8px; border-radius: 4px; font-size: 11px; line-height: 1.5;
      display: none; white-space: pre-wrap;
    }
    .status.info    { display: block; background: #F2F0FF; color: #5C4CD9; }
    .status.error   { display: block; background: #FFE5E5; color: #c0392b; }
    .status.success { display: block; background: #E8F5E9; color: #379E45; }
    hr { border: none; border-top: 1px solid #eee; }
    #exportOut { height: 100px; font-size: 10px; background: #fafafa; }
  </style>
</head>
<body>
  <h3>千岛建稿助手</h3>

  <!-- ── 需求名称 ── -->
  <div class="field">
    <label>需求名称（将作为 Section 标题）</label>
    <input type="text" id="nameInput" placeholder="例：用户用例 #1 · 首页 Feed → 内容详情页">
  </div>

  <!-- ── JSON 配置 ── -->
  <div class="field">
    <label>粘贴 JSON 配置</label>
    <textarea id="jsonInput" placeholder="先运行：npm run figma-sync&#10;JSON 已自动复制，直接 ⌘V 粘贴"></textarea>
  </div>

  <button id="buildBtn">生成页面</button>
  <div id="status" class="status"></div>
  <p class="hint">没有 JSON？终端运行 <code>npm run figma-sync</code>，自动复制到剪贴板</p>

  <hr>

  <!-- ── 导出结构（Figma → HTML） ── -->
  <div class="field">
    <label>选中 section → 导出结构给 Claude</label>
    <button id="exportBtn" class="secondary">导出选中 Section</button>
    <textarea id="exportOut" readonly placeholder="选中 Figma 里的 section，点上方按钮"></textarea>
  </div>

  <script>
    const btn       = document.getElementById('buildBtn');
    const input     = document.getElementById('jsonInput');
    const nameInput = document.getElementById('nameInput');
    const status    = document.getElementById('status');
    const exportBtn = document.getElementById('exportBtn');
    const exportOut = document.getElementById('exportOut');

    function showStatus(msg, type) {
      status.className = 'status ' + type;
      status.textContent = msg;
      autoResize();
    }

    function autoResize() {
      const h = document.documentElement.scrollHeight;
      parent.postMessage({ pluginMessage: { type: 'resize', height: h } }, '*');
    }

    window.addEventListener('load', autoResize);

    btn.addEventListener('click', () => {
      const raw = input.value.trim();
      if (!raw) { showStatus('请先粘贴 JSON 配置', 'error'); return; }
      let config;
      try {
        config = JSON.parse(raw);
      } catch (e) {
        showStatus('JSON 格式错误: ' + e.message, 'error');
        return;
      }
      const name = nameInput.value.trim();
      if (name) config.name = name;
      btn.disabled = true;
      showStatus('正在生成页面...', 'info');
      parent.postMessage({ pluginMessage: { type: 'build', config } }, '*');
    });

    exportBtn.addEventListener('click', () => {
      exportOut.value = '读取中...';
      parent.postMessage({ pluginMessage: { type: 'export' } }, '*');
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'done') {
        showStatus('✅ 已生成 ' + msg.count + ' 个页面  ' + msg.sectionW + ' × ' + msg.sectionH, 'success');
        btn.disabled = false;
      } else if (msg.type === 'error') {
        showStatus('❌ ' + msg.message, 'error');
        btn.disabled = false;
      } else if (msg.type === 'exported') {
        exportOut.value = msg.json;
        exportOut.select();
        document.execCommand('copy');
        exportOut.setSelectionRange(0, 0);
        autoResize();
      } else if (msg.type === 'export-error') {
        exportOut.value = '❌ ' + msg.message;
      }
    };
  </script>
</body>
</html>
