<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>千岛 Design System</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-page:#F7F7F9;--bg-card:#FFFFFF;--bg-card2:#F0EFF5;
  --text-1:#2B263B;--text-2:rgba(43,38,59,0.64);--text-3:rgba(43,38,59,0.40);
  --border-c:rgba(0,0,0,0.08);--accent:#7C66FF;--accent-soft:#F2F0FF;
  --radius-card:16px;--radius-chip:20px;
  --shadow:0 2px 12px rgba(43,38,59,0.08);
}
[data-theme="dark"]{
  --bg-page:#1F1F1F;--bg-card:#2B2B2B;--bg-card2:#333333;
  --text-1:rgba(255,255,255,0.88);--text-2:rgba(255,255,255,0.64);--text-3:rgba(255,255,255,0.40);
  --border-c:rgba(255,255,255,0.08);--accent-soft:rgba(124,102,255,0.12);
  --shadow:0 2px 12px rgba(0,0,0,0.24);
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC','Helvetica Neue',sans-serif;
  background:var(--bg-page);color:var(--text-1);min-height:100vh;
  transition:background 0.25s,color 0.25s;}
.app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;}

/* Loading */
.loading{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  background:var(--bg-page);z-index:999;transition:opacity 0.3s;
}
.loading.hide{opacity:0;pointer-events:none;}
.spin{
  width:32px;height:32px;border:3px solid var(--border-c);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text-3);}

/* Header */
.header{
  position:sticky;top:0;z-index:100;background:var(--bg-card);
  border-bottom:1px solid var(--border-c);
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.header-logo{display:flex;flex-direction:column;gap:2px}
.header-name{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.header-sub{font-size:11px;color:var(--text-3);letter-spacing:0.2px}
.header-right{display:flex;align-items:center;gap:8px;}
.updated-dot{
  display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-3);
}
.dot{width:6px;height:6px;border-radius:50%;background:#52BA5C;}
.theme-toggle{
  display:flex;align-items:center;gap:6px;padding:6px 12px;
  border-radius:var(--radius-chip);background:var(--bg-card2);
  border:none;cursor:pointer;color:var(--text-2);font-size:13px;
  transition:all 0.2s;font-family:inherit;
}
.theme-toggle:active{opacity:0.7;transform:scale(0.96)}

/* Tab bar */
.tabbar{
  display:flex;background:var(--bg-card);
  border-bottom:1px solid var(--border-c);padding:0 16px;
}
.tab{
  flex:1;text-align:center;padding:10px 4px;font-size:13px;
  color:var(--text-3);cursor:pointer;position:relative;
  border:none;background:none;font-family:inherit;
  transition:color 0.2s;letter-spacing:0.2px;
}
.tab.active{color:var(--accent);font-weight:600}
.tab.active::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:24px;height:2px;background:var(--accent);border-radius:2px;
}

/* Content */
.content{padding:16px;padding-bottom:32px;}
.page{display:none}
.page.active{display:block}

/* Section */
.section{margin-bottom:24px}
.section-title{
  font-size:12px;font-weight:600;color:var(--text-3);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:12px;
}

/* Palette */
.palette-group{margin-bottom:20px}
.palette-label{font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.palette-label .badge{font-size:10px;background:var(--bg-card2);padding:2px 6px;border-radius:4px;color:var(--text-3);font-weight:400}
.swatch-row{display:flex;gap:4px;border-radius:12px;overflow:hidden}
.swatch{
  flex:1;aspect-ratio:1/1.4;position:relative;cursor:pointer;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:3px;min-width:0;transition:flex 0.2s;
}
.swatch:hover{flex:1.3}
.swatch-num{font-size:8px;font-weight:700;opacity:0.9;text-align:center;text-shadow:0 1px 2px rgba(0,0,0,0.3);}
.swatch-hex{font-size:6.5px;opacity:0.7;text-align:center;font-family:'SF Mono','Fira Code',monospace;text-shadow:0 1px 2px rgba(0,0,0,0.3);}

/* Checker */
.checker{
  background-image:linear-gradient(45deg,#ccc 25%,transparent 25%),
    linear-gradient(-45deg,#ccc 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#ccc 75%),
    linear-gradient(-45deg,transparent 75%,#ccc 75%);
  background-size:8px 8px;background-position:0 0,0 4px,4px -4px,-4px 0;
  background-color:#fff;
}

/* Radius */
.radius-row{display:flex;gap:10px;flex-wrap:wrap}
.radius-card{
  flex:1;min-width:56px;background:var(--bg-card);border-radius:var(--radius-card);
  padding:12px 8px;text-align:center;box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.radius-demo{width:40px;height:40px;background:var(--accent-soft);border:2px solid var(--accent);}
.radius-name{font-size:11px;font-weight:600;color:var(--text-2)}
.radius-val{font-size:13px;font-weight:700;color:var(--accent)}

/* Spacing */
.spacing-row{display:flex;flex-direction:column;gap:8px}
.spacing-card{
  background:var(--bg-card);border-radius:10px;padding:12px 14px;
  display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);
}
.spacing-bar{height:8px;background:var(--accent);border-radius:4px;min-width:2px}
.spacing-info{flex:1}
.spacing-name{font-size:13px;font-weight:600;color:var(--text-1)}
.spacing-val{font-size:11px;color:var(--text-3);font-family:'SF Mono',monospace}

/* Chips */
.chips-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{
  padding:5px 12px;border-radius:var(--radius-chip);font-size:12px;
  background:var(--bg-card);border:1px solid var(--border-c);
  cursor:pointer;color:var(--text-2);font-family:inherit;
  transition:all 0.15s;white-space:nowrap;
}
.chip:active{transform:scale(0.95)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

/* Token cards */
.token-grid{display:flex;flex-direction:column;gap:6px}
.token-card{
  background:var(--bg-card);border-radius:12px;padding:12px;
  display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);
  cursor:pointer;transition:all 0.15s;
}
.token-card:active{transform:scale(0.98);opacity:0.9}
.token-swatch{
  width:44px;height:44px;border-radius:10px;flex-shrink:0;
  border:1px solid var(--border-c);position:relative;overflow:hidden;
}
.token-swatch-bg{width:100%;height:100%;position:absolute;top:0;left:0}
.token-info{flex:1;min-width:0}
.token-name{font-size:13px;font-weight:600;color:var(--text-1);
  font-family:'SF Mono','Fira Code',monospace;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.token-hex{font-size:11px;color:var(--text-3);font-family:'SF Mono',monospace;margin-top:1px}
.token-chain{font-size:10px;color:var(--text-3);margin-top:3px;display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.chain-node{background:var(--bg-card2);padding:1px 5px;border-radius:4px;white-space:nowrap}
.chain-arrow{color:var(--text-3);font-size:9px}

/* L3 */
.comp-toggle{display:flex;background:var(--bg-card2);border-radius:10px;padding:2px;margin-bottom:16px}
.comp-btn{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:500;
  cursor:pointer;border-radius:8px;color:var(--text-2);border:none;background:none;
  font-family:inherit;transition:all 0.2s;}
.comp-btn.active{background:var(--bg-card);color:var(--accent);font-weight:700;box-shadow:var(--shadow)}

.comp-section{margin-bottom:20px}
.comp-section-head{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;
  background:var(--bg-card2);border-radius:10px;
}
.comp-section-swatch{width:24px;height:24px;border-radius:6px;flex-shrink:0}
.comp-section-title{font-size:13px;font-weight:700;color:var(--text-1)}
.comp-section-sub{font-size:11px;color:var(--text-3);margin-left:auto}

.comp-token-row{
  display:flex;align-items:center;gap:10px;padding:8px 12px;
  background:var(--bg-card);border-radius:10px;margin-bottom:4px;
  box-shadow:var(--shadow);
}
.comp-swatch{width:32px;height:32px;border-radius:7px;flex-shrink:0;border:1px solid var(--border-c);overflow:hidden;position:relative}
.comp-swatch-bg{width:100%;height:100%;position:absolute;}
.comp-role{flex:1;min-width:0}
.comp-role-name{font-size:12px;font-weight:600;color:var(--text-1)}
.comp-role-key{font-size:10px;color:var(--text-3);font-family:'SF Mono',monospace}
.comp-chain{font-size:9px;color:var(--text-3);margin-top:2px;display:flex;align-items:center;gap:2px;flex-wrap:wrap}

.empty{text-align:center;padding:40px 0;color:var(--text-3);font-size:14px}

/* Search */
.searchbar{
  display:flex;align-items:center;gap:8px;background:var(--bg-card);
  border-radius:10px;padding:8px 12px;margin-bottom:12px;
  border:1px solid var(--border-c);
}
.searchbar input{
  flex:1;border:none;background:none;font-size:14px;color:var(--text-1);
  font-family:inherit;outline:none;
}
.searchbar input::placeholder{color:var(--text-3)}

/* Toast */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(43,38,59,0.92);color:#fff;padding:8px 16px;
  border-radius:20px;font-size:12px;opacity:0;pointer-events:none;
  transition:all 0.3s;z-index:999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Loading screen -->
  <div class="loading" id="loading">
    <div class="spin"></div>
    <div class="loading-text">加载设计 Token…</div>
  </div>

  <div class="header">
    <div class="header-logo">
      <div class="header-name">千岛 Design System</div>
      <div class="header-sub">Figma Variables · 三级映射 Token</div>
    </div>
    <div class="header-right">
      <div class="updated-dot" id="updated-info" title="最后更新时间"></div>
      <button class="theme-toggle" onclick="toggleTheme()">
        <span id="themeIcon">🌙</span>
        <span id="themeLabel">暗色</span>
      </button>
    </div>
  </div>

  <div class="tabbar">
    <button class="tab active" onclick="switchTab('l1')">L1 · 原子</button>
    <button class="tab" onclick="switchTab('l2')">L2 · 语义</button>
    <button class="tab" onclick="switchTab('l3')">L3 · 组件</button>
  </div>

  <div class="content">
    <div class="page active" id="page-l1">
      <div class="section">
        <div class="section-title">主色系 · Main</div>
        <div id="main-palettes"></div>
      </div>
      <div class="section">
        <div class="section-title">功能色 · Semantics</div>
        <div id="sem-palettes"></div>
      </div>
      <div class="section">
        <div class="section-title">圆角 · Radius</div>
        <div class="radius-row" id="radius-cards"></div>
      </div>
      <div class="section">
        <div class="section-title">间距 · Spacing</div>
        <div class="spacing-row" id="spacing-cards"></div>
      </div>
    </div>

    <div class="page" id="page-l2">
      <div class="searchbar">
        <span style="color:var(--text-3)">🔍</span>
        <input type="text" id="l2-search" placeholder="搜索 token 名称或色值…" oninput="filterL2()">
      </div>
      <div class="chips-wrap" id="l2-chips"></div>
      <div class="token-grid" id="l2-tokens"></div>
    </div>

    <div class="page" id="page-l3">
      <div class="comp-toggle">
        <button class="comp-btn active" onclick="switchComp('bt')">Button</button>
        <button class="comp-btn" onclick="switchComp('tag')">Tag</button>
      </div>
      <div class="chips-wrap" id="l3-chips"></div>
      <div id="l3-tokens"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CAT_LABELS = {"text":"文字","icon":"图标","border":"描边","bg":"背景","mask":"遮罩","primary":"主色","secondary":"次要色","trade":"交易色","white":"纯白","default":"默认","success":"成功","warning":"警告","error":"错误","transBlack":"透明黑"};
const ROLE_LABELS = {"solidColor":"实色文字","solidBg":"实色背景","color":"色彩","softBg":"柔色背景","outlineColor":"描边色","border":"边框","textColor":"文字色","solidDisabledtempColor":"实色禁用文字","solidDisabledtempBg":"实色禁用背景","disabledtempColor":"禁用文字","softDisabledtempBg":"柔色禁用背景","outlineDisabledtempColor":"描边禁用色","disabledtempBorder":"禁用边框","textDisabledtempColor":"文字禁用色","disabledColor":"禁用文字色","disabledBg":"禁用背景色"};
const MAIN_LABELS = {"primarypurple":"主紫色 Primary Purple","purplegray":"紫灰色 Purple Gray","neutral":"中性色 Neutral","white":"纯白 White"};
const SEM_LABELS = {"green":"成功绿 Green","turquoise":"青绿 Turquoise","zimablue":"天蓝 Zima Blue","blue":"蓝色 Blue","grape":"葡萄紫 Grape","pink":"粉色 Pink","red":"错误红 Red","orange":"警告橙 Orange","yellow":"黄色 Yellow","tendershoots":"嫩芽 Tender Shoots"};

let DATA = null;
let isDark = false;
let currentTab = 'l1';
let currentL2Cat = 'all';
let currentComp = 'bt';
let currentL3Variant = 'all';
let l2SearchTerm = '';

// ---- Load data ----
async function loadData() {
  const cacheBust = '?v=' + Date.now();
  const res = await fetch('tokens/processed.json' + cacheBust);
  if (!res.ok) throw new Error('Failed to load tokens');
  DATA = await res.json();

  // Show last-modified from response header if available
  const lastMod = res.headers.get('last-modified');
  if (lastMod) {
    const d = new Date(lastMod);
    const fmt = d.toLocaleDateString('zh-CN', {month:'short',day:'numeric'}) +
      ' ' + d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('updated-info').innerHTML =
      '<span class="dot"></span>' + fmt + ' 更新';
  }

  document.getElementById('loading').classList.add('hide');
  renderL1();
  renderL2();
  renderL3();
}

loadData().catch(err => {
  document.querySelector('.loading-text').textContent = '加载失败，请刷新重试';
  console.error(err);
});

// ---- Helpers ----
function hexAlpha(hex, alpha) {
  if (!hex) return 'transparent';
  const h = hex.replace('#','');
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  const a = (alpha == null) ? 1 : alpha;
  return Math.abs(a-1) < 0.01 ? hex : `rgba(${r},${g},${b},${a.toFixed(2)})`;
}
function isLight(hex) {
  if (!hex) return true;
  const h = hex.replace('#','');
  return (parseInt(h.slice(0,2),16)*299 + parseInt(h.slice(2,4),16)*587 + parseInt(h.slice(4,6),16)*114) / 1000 > 140;
}
function getColor(t) {
  const hex = isDark ? t.darkHex : t.hex;
  const alpha = isDark ? t.darkAlpha : t.alpha;
  return { hex, alpha, rgba: hexAlpha(hex, alpha) };
}
function copyText(text) {
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => showToast('已复制 ' + text));
}
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

// ---- Theme ----
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : '');
  document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = isDark ? '亮色' : '暗色';
  if (DATA) { renderL2Tokens(); renderL3Tokens(); }
}

// ---- Tab ----
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['l1','l2','l3'][i] === tab));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
}

// ============ L1 ============
function renderL1() {
  const {main_groups, sem_groups, radius, spacing} = DATA;

  function paletteHtml(groups, labelMap) {
    return Object.entries(groups).map(([group, swatches]) => {
      const label = labelMap[group] || group;
      const items = swatches.map(s => {
        const rgba = hexAlpha(s.hex, s.alpha);
        const tc = (s.alpha < 0.5 || isLight(s.hex)) ? '#2B263B' : '#FFFFFF';
        const num = s.key.match(/(\d+)$/)?.[1] || s.key;
        const checker = s.alpha < 0.99 ? ' checker' : '';
        return `<div class="swatch${checker}" style="background:${rgba}" onclick="copyText('${s.hex}')" title="${s.key}">
          <div class="swatch-num" style="color:${tc}">${num}</div>
          <div class="swatch-hex" style="color:${tc}">${s.hex}</div>
        </div>`;
      }).join('');
      return `<div class="palette-group">
        <div class="palette-label">${label} <span class="badge">${swatches.length}</span></div>
        <div class="swatch-row">${items}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('main-palettes').innerHTML = paletteHtml(main_groups, MAIN_LABELS);
  document.getElementById('sem-palettes').innerHTML = paletteHtml(sem_groups, SEM_LABELS);

  const RADIUS_ORDER = ['Large','Medium','Normal','Small','Mini'];
  document.getElementById('radius-cards').innerHTML = RADIUS_ORDER.map(name => {
    const val = radius[name] || 0;
    return `<div class="radius-card">
      <div class="radius-demo" style="border-radius:${val}px"></div>
      <div class="radius-name">${name}</div>
      <div class="radius-val">${val}px</div>
    </div>`;
  }).join('');

  document.getElementById('spacing-cards').innerHTML = Object.entries(spacing).map(([name, val]) => `
    <div class="spacing-card">
      <div class="spacing-bar" style="width:${Math.max(4, val*4)}px"></div>
      <div class="spacing-info">
        <div class="spacing-name">${name}</div>
        <div class="spacing-val">${val}px</div>
      </div>
    </div>`).join('');
}

// ============ L2 ============
function renderL2Chips() {
  const cats = ['all', ...Object.keys(DATA.l2_cats)];
  document.getElementById('l2-chips').innerHTML = cats.map(cat =>
    `<button class="chip ${currentL2Cat===cat?'active':''}" onclick="setL2Cat('${cat}')">${cat==='all'?'全部':(CAT_LABELS[cat]||cat)}</button>`
  ).join('');
}
function setL2Cat(cat) { currentL2Cat = cat; renderL2Chips(); renderL2Tokens(); }
function filterL2() { l2SearchTerm = document.getElementById('l2-search').value.trim().toLowerCase(); renderL2Tokens(); }

function renderL2Tokens() {
  const cats = currentL2Cat === 'all' ? Object.keys(DATA.l2_cats) : [currentL2Cat];
  let tokens = cats.flatMap(cat => (DATA.l2_cats[cat] || []).map(t => ({...t,cat})));
  if (l2SearchTerm) tokens = tokens.filter(t =>
    t.key.toLowerCase().includes(l2SearchTerm) ||
    (t.hex && t.hex.toLowerCase().includes(l2SearchTerm))
  );
  if (!tokens.length) {
    document.getElementById('l2-tokens').innerHTML = '<div class="empty">暂无匹配的 Token</div>';
    return;
  }
  document.getElementById('l2-tokens').innerHTML = tokens.map(t => {
    const c = getColor(t);
    const checker = c.alpha < 0.99 ? ' checker' : '';
    const hexDisp = c.alpha < 0.99 ? `${c.hex} / ${Math.round(c.alpha*100)}%` : (c.hex || '–');
    const chainHtml = t.chain.slice(1).map(n => `<span class="chain-node">${n}</span>`).join('<span class="chain-arrow">›</span>');
    return `<div class="token-card" onclick="copyText('${c.hex||''}')">
      <div class="token-swatch${checker}"><div class="token-swatch-bg" style="background:${c.rgba||'transparent'}"></div></div>
      <div class="token-info">
        <div class="token-name">${t.key}</div>
        <div class="token-hex">${hexDisp}</div>
        ${chainHtml ? `<div class="token-chain"><span class="chain-arrow">→</span>${chainHtml}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}
function renderL2() { renderL2Chips(); renderL2Tokens(); }

// ============ L3 ============
function switchComp(comp) {
  currentComp = comp; currentL3Variant = 'all';
  document.querySelectorAll('.comp-btn').forEach((b,i) => b.classList.toggle('active',['bt','tag'][i]===comp));
  renderL3();
}
function renderL3Chips() {
  const compData = DATA.l3_data[currentComp] || {};
  const variants = ['all', ...Object.keys(compData)];
  document.getElementById('l3-chips').innerHTML = variants.map(v =>
    `<button class="chip ${currentL3Variant===v?'active':''}" onclick="setL3Variant('${v}')">${v==='all'?'全部':(CAT_LABELS[v]||v)}</button>`
  ).join('');
}
function setL3Variant(v) { currentL3Variant = v; renderL3Chips(); renderL3Tokens(); }

function renderL3Tokens() {
  const compData = DATA.l3_data[currentComp] || {};
  const variants = currentL3Variant === 'all' ? Object.keys(compData) : [currentL3Variant];
  let html = variants.map(variant => {
    const tokens = compData[variant];
    if (!tokens?.length) return '';
    const fc = getColor(tokens[0]);
    const rows = tokens.map(t => {
      const c = getColor(t);
      const checker = c.alpha < 0.99 ? ' checker' : '';
      const hexDisp = c.alpha < 0.99 ? `${c.hex}/${Math.round(c.alpha*100)}%` : (c.hex || '–');
      const chainHtml = t.chain.map((n,i) =>
        (i>0?'<span class="chain-arrow">›</span>':'')+`<span class="chain-node" style="${i===t.chain.length-1?'opacity:.5':''}">${n}</span>`
      ).join('');
      return `<div class="comp-token-row" onclick="copyText('${c.hex||''}')">
        <div class="comp-swatch${checker}"><div class="comp-swatch-bg" style="background:${c.rgba||'transparent'}"></div></div>
        <div class="comp-role">
          <div class="comp-role-name">${ROLE_LABELS[t.name]||t.name}</div>
          <div class="comp-role-key">${t.name} · ${hexDisp}</div>
          <div class="comp-chain">${chainHtml}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="comp-section">
      <div class="comp-section-head">
        <div class="comp-section-swatch" style="background:${fc.rgba};border:1px solid rgba(0,0,0,.08)"></div>
        <div class="comp-section-title">${CAT_LABELS[variant]||variant}</div>
        <div class="comp-section-sub">${variant}</div>
      </div>${rows}</div>`;
  }).join('');
  document.getElementById('l3-tokens').innerHTML = html || '<div class="empty">暂无数据</div>';
}
function renderL3() { renderL3Chips(); renderL3Tokens(); }
</script>
</body>
</html>
