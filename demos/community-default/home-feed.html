<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>首页 Feed · 千岛</title>
<link rel="stylesheet" href="https://at.alicdn.com/t/c/font_3550031_uwcy4h4l9a9.css">
<link rel="stylesheet" href="styles.css">
<style>
/* ── 手机 flex 列布局 ── */
.phone { display:flex; flex-direction:column; }
.scroll-area { flex:1; }

/* ── IslandsHeader + IslandsPin 深色顶部区域 ── */
.islands-top { background:var(--secondary-solid-bg); flex-shrink:0; }
.islands-top .status-bar         { background:transparent; }
.islands-top .status-bar-time    { color:var(--white-text-color); }
.islands-top .status-bar-icons   { color:var(--white-text-color); }
.islands-top .navbar             { background:transparent; border-bottom:none; }
.islands-top .navbar-logo        { color:var(--white-text-color); }
.islands-top .navbar-logo span   { color:var(--white-text-color); }
.islands-top .search-bar         { background:var(--white-soft-bg); }
.islands-top .search-bar i       { color:var(--white-text-2); }
.islands-top .search-bar span    { color:var(--white-text-2); }
.islands-top .icon-btn           { color:var(--white-text-color); background:transparent; }

/* ── IslandsPin ── */
.islands-pin {
  height:85px; display:flex; align-items:center;
  padding:0 var(--spacing-normal); overflow-x:auto; scrollbar-width:none;
}
.islands-pin::-webkit-scrollbar { display:none; }
.pin-item {
  width:68px; flex-shrink:0;
  display:flex; flex-direction:column; align-items:center; gap:var(--spacing-small);
}
.pin-avatar {
  width:48px; height:48px;
  border-radius:var(--radius-normal);
  background:var(--white-soft-bg);
  display:flex; align-items:center; justify-content:center;
}
.pin-avatar i    { color:var(--white-text-color); }
.pin-avatar.img  { background:var(--white-3); font-size:24px; }
.pin-name        { color:var(--white-text-color); }

/* ── Feed 双列 ── */
.feed-dual {
  column-count:2; column-gap:var(--spacing-normal);
  padding:var(--spacing-normal); background:var(--bg-2);
}
.feed-card {
  background:var(--bg-1); border-radius:var(--radius-normal);
  overflow:hidden; cursor:pointer;
  break-inside:avoid; display:inline-block; width:100%;
  margin-bottom:var(--spacing-normal);
}
.card-img {
  width:100%; aspect-ratio:4/3;
  background:var(--bg-4);
  display:flex; align-items:center; justify-content:center;
  font-size:32px;
}
.card-body    { padding:var(--spacing-small); }
.card-title   { color:var(--text-1); }

/* ── 深色 TabBar ── */
.tabbar-dark {
  background:var(--secondary-solid-bg);
  border-top-color:var(--white-3);
}
.tabbar-dark .tab-bar-item i        { color:var(--white-text-3); }
.tabbar-dark .tab-bar-item .tb-label{ color:var(--white-text-3); }
.tabbar-dark .tab-bar-item.active i { color:var(--white-text-color); }
.tabbar-dark .tab-bar-item.active .tb-label { color:var(--white-text-color); }
.tabbar-dark .tb-badge { border-color:var(--secondary-solid-bg); }
</style>
</head>
<body>

<div class="prototype-layout">
<div class="phone">

  <!-- ── Islands 顶部（secondary/solidBg 深色背景）── -->
  <div class="islands-top">

    <!-- StatusBarGhost -->
    <div class="status-bar">
      <span class="status-bar-time t-h6">9:41</span>
      <div class="status-bar-icons t-b6"><span>●●● WiFi 🔋</span></div>
    </div>

    <!-- IslandsHeader -->
    <div class="navbar">
      <span class="navbar-logo t-h4">千<span>岛</span></span>
      <div class="search-bar">
        <i class="KurilIcons kuril-search ki-16"></i>
        <span class="t-b5">搜索</span>
      </div>
      <button class="icon-btn"><i class="KurilIcons kuril-hamburger ki-22"></i></button>
    </div>

    <!-- IslandsPin -->
    <div class="islands-pin">
      <div class="pin-item">
        <div class="pin-avatar">
          <i class="KurilIcons ki-22 kuril-discover"></i>
        </div>
        <span class="pin-name t-h8">首页</span>
      </div>
      <div class="pin-item">
        <div class="pin-avatar img">🎨</div>
        <span class="pin-name t-h8">设计岛</span>
      </div>
      <div class="pin-item">
        <div class="pin-avatar img">🧸</div>
        <span class="pin-name t-h8">潮玩岛</span>
      </div>
    </div>

  </div><!-- .islands-top -->

  <!-- Feed 滚动区 -->
  <div class="scroll-area">
    <div class="feed-dual">

      <!-- FeedCard 1 -->
      <div class="feed-card" onclick="location.href='content-detail.html'">
        <div class="card-img">🎨</div>
        <div class="card-body">
          <p class="card-title t-b6">这套 Figma Variables 三级映射真的太绝了</p>
        </div>
      </div>

      <!-- FeedCard 2 -->
      <div class="feed-card" onclick="location.href='content-detail.html'">
        <div class="card-img" style="aspect-ratio:3/4">🌿</div>
        <div class="card-body">
          <p class="card-title t-b6">手办开箱 限定版</p>
        </div>
      </div>

    </div>
  </div>

  <!-- TabBar（深色变体） -->
  <div class="tabbar tabbar-dark">
    <div class="tab-bar-item active">
      <i class="KurilIcons kuril-discover"></i>
      <span class="tb-label">岛</span>
    </div>
    <div class="tab-bar-item">
      <i class="KurilIcons kuril-all"></i>
      <span class="tb-label">发现</span>
    </div>
    <div class="tab-bar-item">
      <i class="KurilIcons kuril-plus_circle_filled"></i>
      <span class="tb-label">发布</span>
    </div>
    <div class="tab-bar-item" style="position:relative">
      <i class="KurilIcons kuril-message"></i>
      <span class="tb-label">消息</span>
      <span class="tb-badge">2</span>
    </div>
    <div class="tab-bar-item">
      <i class="KurilIcons kuril-me_account"></i>
      <span class="tb-label">我的</span>
    </div>
  </div>

</div><!-- .phone -->

<!-- 流程图 -->
<div class="flow-chart">
  <a class="flow-node active" href="home-feed.html">
    <span class="node-icon">🏠</span>
    <span class="node-label">首页 Feed</span>
  </a>
  <div class="flow-edge"><span class="flow-edge-label">点击卡片</span></div>
  <a class="flow-node" href="content-detail.html">
    <span class="node-icon">📄</span>
    <span class="node-label">内容详情页</span>
  </a>
</div>

</div><!-- .prototype-layout -->
</body>
</html>
